# Dotfiles: global Limine options (merge at top of /boot/limine.conf).
# First boot with timeout: 1, confirm default_entry boots the right kernel, then set timeout: 0.
# default_entry is 0-based; change if your menu order differs.
# Cmdline: lines are often regenerated on kernel updates — re-run bin/setup-limine-quiet-boot.sh if quiet params disappear.

timeout: 0
quiet: yes
default_entry: 2
interface_branding: Omarchy Bootloader
interface_branding_color: 2
hash_mismatch_panic: no

# Fence interactive apps (browsers, editors — and the nested app-graphical.slice
# that uwsm puts GUI apps in) off the reserved UI thread (CPU 7), so they can't
# contend with the compositor under load. session.slice is deliberately NOT
# fenced: it inherits the full CPU set from user@.service and so gets exclusive
# use of CPU 7 whenever everything else is busy.
#
# Requires the cpuset controller to be delegated to the user manager — set up by
# bin/setup-cpu-reservation.sh. Until that lands (next login after the script
# runs) this drop-in is inert. See README "UI CPU priority".
[Slice]
AllowedCPUs=0-6

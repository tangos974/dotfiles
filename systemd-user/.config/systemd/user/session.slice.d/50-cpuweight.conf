# Boost the UI-critical session slice (Hyprland via uwsm's wayland-wm@
# service, pipewire, wireplumber) to 5x the CPU share of app.slice, so a
# busy build/browser/encode can't starve the compositor into missing
# frames and stuttering every monitor at once.
# Weights are relative between sibling slices (default 100) and only
# matter under CPU contention — no effect on an idle machine.
[Slice]
CPUWeight=500

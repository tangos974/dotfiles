general {
    lock_cmd = omarchy-system-lock                         # lock screen and 1password
    before_sleep_cmd = OMARCHY_LOCK_ONLY=true omarchy-system-lock    # lock before suspend without scheduling display off.
    after_sleep_cmd = sleep 1 && omarchy-system-wake                 # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

# Start screensaver after 5 minutes
listener {
    timeout = 300
    on-timeout = pidof hyprlock || omarchy-launch-screensaver
}

# Lock system after 10 minutes (screensaver resets the idle timer at 5 min, so this is the remaining 5 min + 2s margin)
listener {
    timeout = 302
    on-timeout = omarchy-system-lock
    on-resume = omarchy-system-wake
}

# Power the display fully off ~30s after lock (deeper than the backlight-off that lock already does)
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Deep idle: suspend to RAM at ~15 min, then systemd hibernates to swap after HibernateDelaySec
# (set to 5min in /etc/systemd/sleep.conf.d/70-sleep.conf) → full hibernate at ~20 min.
listener {
    timeout = 600
    on-timeout = systemctl suspend-then-hibernate
    on-resume = omarchy-system-wake
}

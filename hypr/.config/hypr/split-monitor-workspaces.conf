# Load hyprpm-managed plugins on startup
exec-once = hyprpm reload -n

# Omarchy compatibility: remove Omarchy's default workspace binds first
unbind = SUPER, code:10
unbind = SUPER, code:11
unbind = SUPER, code:12
unbind = SUPER, code:13
unbind = SUPER, code:14
unbind = SUPER, code:15
unbind = SUPER, code:16
unbind = SUPER, code:17
unbind = SUPER, code:18
unbind = SUPER, code:19

unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19

plugin {
    split-monitor-workspaces {
        count = 10
        keep_focused = 0
        enable_notifications = 0
        enable_persistent_workspaces = 1
        enable_wrapping = 1
        link_monitors = 0

        # Physical order: left external, laptop, right external
        monitor_priority = DP-2, eDP-1, DP-1
    }
}

# Use the plugin's workspace dispatchers, not plain workspace / movetoworkspace
bind = SUPER, code:10, split-workspace, 1
bind = SUPER, code:11, split-workspace, 2
bind = SUPER, code:12, split-workspace, 3
bind = SUPER, code:13, split-workspace, 4
bind = SUPER, code:14, split-workspace, 5
bind = SUPER, code:15, split-workspace, 6
bind = SUPER, code:16, split-workspace, 7
bind = SUPER, code:17, split-workspace, 8
bind = SUPER, code:18, split-workspace, 9
bind = SUPER, code:19, split-workspace, 10

bind = SUPER SHIFT, code:10, split-movetoworkspacesilent, 1
bind = SUPER SHIFT, code:11, split-movetoworkspacesilent, 2
bind = SUPER SHIFT, code:12, split-movetoworkspacesilent, 3
bind = SUPER SHIFT, code:13, split-movetoworkspacesilent, 4
bind = SUPER SHIFT, code:14, split-movetoworkspacesilent, 5
bind = SUPER SHIFT, code:15, split-movetoworkspacesilent, 6
bind = SUPER SHIFT, code:16, split-movetoworkspacesilent, 7
bind = SUPER SHIFT, code:17, split-movetoworkspacesilent, 8
bind = SUPER SHIFT, code:18, split-movetoworkspacesilent, 9
bind = SUPER SHIFT, code:19, split-movetoworkspacesilent, 10

# Personal overrides on top of omarchy's apps/*.conf rules. Sourced AFTER
# them so these win. Opacity uses `override` to set absolute values —
# Hyprland multiplies opacity rules by default
# (https://wiki.hypr.land/Configuring/Basics/Window-Rules/).

# Mullvad webapp launcher (--class WebApp): treat as a foreground app even
# when not focused — no dim, no blur, fully opaque.
windowrule = tag -default-opacity, match:class WebApp
windowrule = opacity 1 1 override, match:class WebApp
windowrule = no_dim on, match:class WebApp
windowrule = no_blur on, match:class WebApp

# Less aggressive transparency than omarchy's 0.97/0.9.
windowrule = opacity 1.0 0.97 override, match:tag default-opacity
windowrule = opacity 1.0 0.97 override, match:tag terminal
windowrule = opacity 1.0 0.995 override, match:tag chromium-based-browser
windowrule = opacity 1.0 0.995 override, match:tag firefox-based-browser
